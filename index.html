<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Une invitation poétique et moderne à se reconnecter avec le calme et la beauté sauvage de la forêt.">
    <title>Silva — L'Appel de la Nature</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        /* Modern CSS Reset & Variables */
        :root {
            --forest-deep: #05130b;
            --forest-mid: #0b2516;
            --forest-light: #164028;
            --emerald-glow: #24b46c;
            --mint: #a8e6cf;
            --cream: #f4f7f5;
            --white: #ffffff;
            --glass-bg: rgba(11, 37, 22, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-display: 'Playfair Display', serif;
            --font-sans: 'Outfit', sans-serif;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: radial-gradient(circle at 50% 50%, var(--forest-mid) 0%, var(--forest-deep) 100%);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract Organic Background Elements */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            pointer-events: none;
            opacity: 0.3;
        }

        body::before {
            width: 40vw;
            height: 40vw;
            background: var(--emerald-glow);
            top: -10vw;
            right: -10vw;
            animation: float 20s infinite ease-in-out alternate;
        }

        body::after {
            width: 50vw;
            height: 50vw;
            background: var(--forest-light);
            bottom: -15vw;
            left: -15vw;
            animation: float 25s infinite ease-in-out alternate-reverse;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(4vw, -4vw) scale(1.1);
            }
        }

        /* Header Style */
        header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--white);
            text-decoration: none;
        }

        .logo svg {
            fill: var(--emerald-glow);
            width: 28px;
            height: 28px;
            animation: heartbeat 4s infinite ease-in-out;
        }

        @keyframes heartbeat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08) rotate(3deg);
            }
        }

        /* Main Section & Layout */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .hero-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem 3rem;
            max-width: 680px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(20px);
            opacity: 0;
            animation: slideIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1.25rem;
            border-radius: 100px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--mint);
            margin-bottom: 2rem;
        }

        /* Titles and Texts */
        h1 {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 400;
            line-height: 1.15;
            color: var(--white);
            margin-bottom: 1.5rem;
        }

        h1 span {
            font-style: italic;
            font-weight: 700;
            display: block;
            background: linear-gradient(135deg, var(--white) 30%, var(--mint) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            color: rgba(244, 247, 245, 0.8);
            margin-bottom: 2.5rem;
            max-width: 580px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Premium Interactive Button */
        .btn-modern {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.1rem 2.5rem;
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--forest-deep);
            background: var(--white);
            border: none;
            border-radius: 100px;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2),
                0 0 0 0px rgba(255, 255, 255, 0.2);
            transition: var(--transition);
            z-index: 1;
        }

        .btn-modern::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--mint) 0%, var(--emerald-glow) 100%);
            z-index: -1;
            opacity: 0;
            transition: var(--transition);
        }

        .btn-modern:hover {
            transform: translateY(-3px) scale(1.03);
            color: var(--white);
            box-shadow: 0 15px 35px rgba(36, 180, 108, 0.3),
                0 0 0 6px rgba(255, 255, 255, 0.1);
        }

        .btn-modern:hover::before {
            opacity: 1;
        }

        .btn-modern:active {
            transform: translateY(-1px) scale(1.01);
        }

        /* Footer Style */
        footer {
            width: 100%;
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            color: rgba(244, 247, 245, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            z-index: 10;
        }

        /* Responsiveness adjustments */
        @media (max-width: 768px) {
            .hero-card {
                padding: 2.5rem 1.5rem;
            }

            header {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- Header Navigation -->
    <header>
        <a href="#" class="logo" id="header-logo">
            <!-- SVG Leaf Icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M17 8C15 8 11.5 9.5 9 12C6.5 14.5 6 18 6 18C6 18 9.5 17.5 12 15C14.5 12.5 16 9 16 9M2 22C2 22 5 18 7 18M12 2C8 2 4 6 4 10C4 14 8 18 12 18C16 18 20 14 20 10C20 6 16 2 12 2Z" />
            </svg>
            <span>SILVA</span>
        </a>
    </header>

    <!-- Main Content -->
    <main>
        <div class="hero-card" id="main-card">
            <span class="badge" id="welcome-badge">🌳 Immersion Sauvage</span>

            <h1 id="welcome-title">
                Le murmure silencieux
                <span>de la forêt.</span>
            </h1>

            <p id="welcome-description">
                Évadez-vous du tumulte quotidien. Laissez-vous envelopper par la sérénité des arbres, respirez l'air pur
                et retrouvez votre harmonie naturelle.
            </p>

            <a href="#" class="btn-modern" id="action-button">
                Commencer l'exploration
            </a>
        </div>
    </main>

    <!-- Footer Copyright -->
    <footer>
        <p style="margin: 0;" id="footer-text">&copy; 2026 Silva. Conçu en harmonie avec la nature.</p>
    </footer>

</body>

</html>
