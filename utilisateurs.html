<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Liste des utilisateurs de la plateforme Silva.">
    <title>Silva — Liste des Utilisateurs</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Modern CSS Reset & Variables */
        :root {
            --forest-deep: #05130b;
            --forest-mid: #0b2516;
            --forest-light: #164028;
            --emerald-glow: #24b46c;
            --mint: #a8e6cf;
            --cream: #f4f7f5;
            --white: #ffffff;
            --glass-bg: rgba(11, 37, 22, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-display: 'Playfair Display', serif;
            --font-sans: 'Outfit', sans-serif;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: radial-gradient(circle at 50% 50%, var(--forest-mid) 0%, var(--forest-deep) 100%);
            color: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract Background Elements */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 1;
            pointer-events: none;
            opacity: 0.3;
        }

        body::before {
            width: 40vw;
            height: 40vw;
            background: var(--emerald-glow);
            top: -10vw;
            right: -10vw;
            animation: float 20s infinite ease-in-out alternate;
        }

        body::after {
            width: 50vw;
            height: 50vw;
            background: var(--forest-light);
            bottom: -15vw;
            left: -15vw;
            animation: float 25s infinite ease-in-out alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(4vw, -4vw) scale(1.1); }
        }

        /* Header Style */
        header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--white);
            text-decoration: none;
        }

        .logo svg {
            fill: var(--emerald-glow);
            width: 28px;
            height: 28px;
        }

        /* Main Section & Table Layout */
        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(20px);
            opacity: 0;
            animation: slideIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .container-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.2rem);
            font-weight: 400;
            color: var(--white);
            margin-bottom: 0;
        }

        h1 span {
            font-style: italic;
            font-weight: 700;
            background: linear-gradient(135deg, var(--white) 30%, var(--mint) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Modern Table Style */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 2.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th {
            padding: 1rem 1.5rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--mint);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(244, 247, 245, 0.9);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Status badges */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
        }

        .status.active {
            background: rgba(36, 180, 108, 0.15);
            color: #4ade80;
        }

        .status.inactive {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
        }

        /* Action Buttons */
        .btn-container {
            display: flex;
            justify-content: center;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2.2rem;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--forest-deep);
            background: var(--white);
            border: none;
            border-radius: 100px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }

        .btn-back:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.1);
            background: var(--mint);
        }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--white);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-add:hover {
            background: var(--emerald-glow);
            color: var(--forest-deep);
            border-color: var(--emerald-glow);
            box-shadow: 0 10px 25px rgba(36, 180, 108, 0.3);
        }

        /* Modal Popup styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .modal-close:hover {
            color: var(--white);
        }

        .modal-card h2 {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--white);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--mint);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--white);
            font-family: var(--font-sans);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--emerald-glow);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(36, 180, 108, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 600;
            color: var(--forest-deep);
            background: var(--white);
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: var(--emerald-glow);
            color: var(--white);
            box-shadow: 0 10px 20px rgba(36, 180, 108, 0.2);
        }

        /* Footer Style */
        footer {
            width: 100%;
            text-align: center;
            padding: 2rem;
            font-size: 0.85rem;
            color: rgba(244, 247, 245, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <a href="index.html" class="logo">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17 8C15 8 11.5 9.5 9 12C6.5 14.5 6 18 6 18C6 18 9.5 17.5 12 15C14.5 12.5 16 9 16 9M2 22C2 22 5 18 7 18M12 2C8 2 4 6 4 10C4 14 8 18 12 18C16 18 20 14 20 10C20 6 16 2 12 2Z"/>
            </svg>
            <span>SILVA</span>
        </a>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container">
            <div class="container-header">
                <h1>Liste des <span>utilisateurs</span></h1>
                <button class="btn-add" id="open-modal-btn">
                    ➕ Ajouter
                </button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Utilisateur</th>
                            <th>Rôle</th>
                            <th>Email</th>
                            <th>Statut</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <!-- Rempli dynamiquement en JS -->
                    </tbody>
                </table>
            </div>
            
            <div class="btn-container">
                <a href="index.html" class="btn-back">
                    Retour à l'accueil
                </a>
            </div>
        </div>
    </main>

    <!-- Modal Popup Structure -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" id="close-modal-btn">&times;</button>
            <h2>Nouvel <span>Utilisateur</span></h2>
            
            <form id="add-user-form">
                <div class="form-group">
                    <label class="form-label" for="firstname">Prénom</label>
                    <input class="form-input" type="text" id="firstname" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="lastname">Nom</label>
                    <input class="form-input" type="text" id="lastname" required autocomplete="off">
                </div>
                <button type="submit" class="btn-submit">Valider</button>
            </form>
        </div>
    </div>

    <!-- Footer Copyright -->
    <footer>
        <p>&copy; 2026 Silva. Conçu en harmonie avec la nature.</p>
    </footer>

    <!-- JavaScript logic -->
    <script>
        const tableBody = document.getElementById('users-table-body');
        const modalOverlay = document.getElementById('modal-overlay');
        const openModalBtn = document.getElementById('open-modal-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const addUserForm = document.getElementById('add-user-form');

        // Charger et afficher les utilisateurs depuis l'API
        async function fetchUsers() {
            try {
                const response = await fetch('/api/users');
                const users = await response.json();
                
                tableBody.innerHTML = '';
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    const statusClass = user.status.toLowerCase() === 'actif' ? 'active' : 'inactive';
                    
                    tr.innerHTML = `
                        <td>${user.firstname} ${user.lastname}</td>
                        <td>${user.role}</td>
                        <td>${user.email}</td>
                        <td><span class="status ${statusClass}">● ${user.status}</span></td>
                    `;
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error('Erreur de chargement des utilisateurs:', error);
            }
        }

        // Gérer l'ouverture/fermeture du modal
        openModalBtn.addEventListener('click', () => {
            modalOverlay.classList.add('active');
            document.getElementById('firstname').focus();
        });

        closeModalBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
            addUserForm.reset();
        });

        // Fermer le modal si on clique à l'extérieur
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
                addUserForm.reset();
            }
        });

        // Soumettre le formulaire
        addUserForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstname = document.getElementById('firstname').value.trim();
            const lastname = document.getElementById('lastname').value.trim();

            if (!firstname || !lastname) return;

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ firstname, lastname })
                });

                if (response.ok) {
                    modalOverlay.classList.remove('active');
                    addUserForm.reset();
                    await fetchUsers(); // Recharger la liste
                } else {
                    const err = await response.json();
                    alert('Erreur: ' + err.error);
                }
            } catch (error) {
                console.error('Erreur lors de la création de l\'utilisateur:', error);
            }
        });

        // Chargement initial
        window.addEventListener('DOMContentLoaded', fetchUsers);
    </script>
</body>
</html>
